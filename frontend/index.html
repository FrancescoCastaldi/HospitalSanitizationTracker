<!DOCTYPE html>
<html lang="it">
<head>
<link rel="icon" type="image/png" href="./favicon-16x16.png">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hospital Sanitization Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    
    <img src="./logo.png"   width="200" height="100" style="background-color: transparent;"> 
   <!--  <h1>Hospital Sanitization Tracker</h1> -->
    <div id="walletInfo"></div>
    <span id="walletRole" class="role-badge">Guest</span>
    <div class="role-selector">
        <div style="display:flex; gap:8px; align-items:center;">
            <label style="color:#aaa; font-size:0.85rem; margin:0;">Login as:</label>
            <select id="desiredRole">
                <option value="admin">Admin</option>
                <option value="operator">Operator</option>
            </select>
        </div>
        <p id="desiredRoleHint" class="hint"></p>
    </div>
    <button id="connectButton">Connect</button>
    <div id="loader" class="loader"></div>
</header>


<main>
    <section id="dashboardSection" style="grid-column: 1 / -1;">
        <div class="section-header">
            <h2>Area Overview</h2>
            <button id="refreshDashboardBtn" class="btn-small">Refresh</button>
        </div>

        <div class="scan-controls">
            <div class="scan-option">
                <label class="scan-label">
                    <input type="radio" name="scanMode" value="manual" checked> ID specifici
                </label>
                <input type="text" id="manualIds" placeholder="es. 101, 5, 200" style="width:220px;">
            </div>
            <div class="scan-option">
                <label class="scan-label">
                    <input type="radio" name="scanMode" value="range"> Intervallo
                </label>
                <span style="display:flex; gap:6px; align-items:center;">
                    <input type="number" id="scanFrom" placeholder="Da" style="width:80px;" value="1">
                    <span style="color:#555; font-size:0.8rem;">→</span>
                    <input type="number" id="scanTo" placeholder="A" style="width:80px;" value="150">
                </span>
            </div>
            <button id="loadAreasBtn" class="btn-small" style="align-self:flex-end;">Carica aree</button>
        </div>

        <div id="dashboardContent">
            <p class="empty-state">Connetti il wallet e seleziona le aree da visualizzare.</p>
        </div>
    </section>

    <section>
        <h2>Role Management</h2>
        <div class="form-group">
            <h3>Register Area</h3>
            <label>ID: <input type="number" id="areaId" placeholder="1"></label>
            <label>Name: <input type="text" id="areaName" placeholder="Sala Operatoria A"></label>
            <button id="registerAreaBtn" disabled>Register Area</button>
            <div id="areaMsg" class="msg"></div>
        </div>
        <div class="form-group">
            <h3>Register Operator</h3>
            <label>Address: <input type="text" id="operatorAddress" placeholder="0x..."></label>
            <label>Name: <input type="text" id="operatorName" placeholder="Mario Rossi"></label>
            <button id="registerOperatorBtn" disabled>Register Operator</button>
            <div id="operatorMsg" class="msg"></div>
        </div>
    </section>

    <section>
        <h2>Record Sanitization</h2>
        <label>Area ID: <input type="number" id="sanitAreaId" placeholder="1"></label>
        <label>Outcome:
            <select id="sanitOutcome">
                <option value="OK">OK</option>
                <option value="WARNING">WARNING</option>
                <option value="FAILED">FAILED</option>
            </select>
        </label>
        <label>Notes: <input type="text" id="sanitNotes" placeholder="Dettagli operazione..."></label>
        <button id="recordSanitizationBtn">Record on Chain</button>
        <div id="sanitMsg" class="msg"></div>
    </section>

    <section>
        <h2>Area Status</h2>
        <label>Area ID: <input type="number" id="statusAreaId" placeholder="1"></label>
        <button id="getStatusBtn">Get Status</button>
        <pre id="statusResult">Inserisci un Area ID...</pre>
    </section>

    <section>
        <h2>Event History</h2>
        <label>Area ID: <input type="number" id="eventsAreaId" placeholder="1"></label>
        <button id="getEventsBtn">Get Events</button>
        <pre id="eventsResult">Inserisci un Area ID...</pre>
    </section>
</main>

<script src="https://unpkg.com/ethers@6.13.2/dist/ethers.umd.min.js"></script>
<script src="app.js"></script>
<footer>
  <p>&copy; 2026 Hospital Sanitization Tracker - Francesco Castaldi - UNIBO</p>
  <img src="./logo.png" width="200" height="100" class="footer-logo">
</footer>

</body>
</html>
